name: Build dependent natives

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        os: [linux, windows]
        include:
          - os: linux
            runner: ubuntu-latest
          - os: windows
            runner: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    # =========================
    # Install dependencies
    # =========================
    - name: Install dependencies (Linux)
      if: matrix.os == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          mingw-w64 \
          autoconf automake libtool

    - name: Setup MSYS2 (Windows)
      if: matrix.os == 'windows'
      uses: msys2/setup-msys2@v2
      with:
        update: true
        msystem: MINGW64
        install: >-
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-make
          autoconf
          automake
          libtool
          pkg-config
          git

    # =========================
    # Build plutosvg (CMake)
    # =========================
    - name: Build plutosvg
      shell: bash
      run: |
        mkdir -p build/plutosvg
        cd build/plutosvg

        if [ "${{ matrix.os }}" = "windows" ]; then
          cmake ../../include/plutosvg \
            -G "MinGW Makefiles" \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DBUILD_SHARED_LIBS=OFF \
            -DPLUTOSVG_BUILD_STATIC=ON \
            -DPLUTOSVG_HAS_FREETYPE=ON
          mingw32-make -j
        else
          cmake ../../include/plutosvg \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DPLUTOSVG_BUILD_STATIC=ON \
            -DPLUTOSVG_HAS_FREETYPE=ON
          make -j
        fi

    # =========================
    # Build FreeType
    # =========================
    - name: Build FreeType
      shell: bash
      run: |
        cd include/freetype
    
        if [ "${{ matrix.os }}" = "windows" ]; then
          # Ensure MSYS2 MinGW64 environment is active
          export PATH="/c/msys64/mingw64/bin:$PATH"
          
          mkdir -p build
          cd build
    
          cmake .. \
            -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DFT_WITH_ZLIB=OFF \
            -DFT_WITH_PNG=OFF \
            -DFT_WITH_BZIP2=OFF \
            -DFT_WITH_HARFBUZZ=OFF
    
          mingw32-make -j
        else
          ./autogen.sh || true
          ./configure \
            CFLAGS="-fPIC" --enable-static --disable-shared \
            --without-png --without-bzip2 --without-harfbuzz
          make -j
        fi

    # =========================
    # Collect artifacts
    # =========================
    - name: Collect artifacts
      shell: bash
      run: |
        mkdir -p build/artifacts

        if [ "${{ matrix.os }}" = "windows" ]; then
          cp build/plutosvg/*.a build/artifacts/plutosvg-windows.a || true
          cp include/freetype/objs/.libs/libfreetype.a build/artifacts/freetype-windows.a || true
        else
          cp build/plutosvg/*.a build/artifacts/plutosvg-linux.a || true
          cp include/freetype/objs/.libs/libfreetype.a build/artifacts/freetype-linux.a || true
        fi

    # =========================
    # Upload artifacts
    # =========================
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dependency-build-${{ matrix.os }}-${{ github.run_number }}
        path: |
          build/*
