name: Generate and Build

on:
  workflow_dispatch:

jobs:
  generate-bindings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install SWIG
        run: |
          sudo apt-get update
          sudo apt-get install -y swig

      - name: Generate Java Bindings
        run: |
          mkdir -p generated/java
          swig -c++ -java -package imgui \
               -outdir generated/java \
               -o generated/wrapper.cpp \
               bindings.i

  build:
    runs-on: ${{ matrix.os }}
    needs: generate-bindings
    strategy:
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install SWIG (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y swig
          else
            brew install swig
          fi

      - name: Install SWIG (Windows)
        if: runner.os == 'Windows'
        run: choco install swig

      - name: Generate Bindings
        run: |
          mkdir -p generated/java
          swig -c++ -java -package imgui \
               -outdir generated/java \
               -o generated/wrapper.cpp \
               bindings.i

      - name: Compile C++ Code
        run: |
          g++ -fPIC -c generated/wrapper.cpp -o wrapper.o
          g++ -fPIC -c src/your_code.cpp -o your_code.o
          g++ -shared wrapper.o your_code.o -o libnative.so

      - name: Compile Java Code
        run: |
          javac generated/java/*.java

      - name: Add to Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            libnative.so
            generated/java/*.class

  create-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Create Release
        run: |
          echo "Use gh CLI or release action here"
