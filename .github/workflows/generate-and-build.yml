name: Build and Release (SWIG JNI)

on:
  workflow_dispatch:

jobs:
  generate-bindings:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Generate version
        id: version
        run: echo "version=0.1.${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT

      - name: Install SWIG
        run: sudo apt-get update && sudo apt-get install -y swig

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate bindings
        run: |
          mkdir -p generated/java/imgui

          swig -c++ -java \
            -package imgui \
            -outdir generated/java/imgui \
            -o generated/wrapper.cpp \
            -Iinclude \
            bindings.i

      - name: Copy handwritten classes
        run: |
          mkdir -p build
          cp -a src/. /generated/
          cp -a src/. /build/

      - name: Compile Java
        run: |
          javac -d build generated/java/*.java

      - name: Create base JAR
        run: |
          mkdir -p dist
          jar cf dist/imgui.jar -C build .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: base
          path: |
            generated/
            dist/imgui.jar

  build-natives:
    needs: generate-bindings
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/download-artifact@v4
        with:
          name: base
          path: .

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set JNI paths
        run: |
          echo "JNI_INCLUDE=$JAVA_HOME/include" >> $GITHUB_ENV

          if [ "$RUNNER_OS" = "Linux" ]; then
            echo "JNI_PLATFORM=$JAVA_HOME/include/linux" >> $GITHUB_ENV
          else
            echo "JNI_PLATFORM=$JAVA_HOME/include/win32" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Compile native
        run: |
          mkdir -p build/native

          if [ "$RUNNER_OS" = "Windows" ]; then
            g++ -shared -o build/native/imgui.dll \
              -I"$JNI_INCLUDE" \
              -I"$JNI_PLATFORM" \
              -Iinclude -Iinclude/imgui \
              generated/wrapper.cpp \
              include/imgui/imgui.cpp \
              include/imgui/imgui_draw.cpp \
              include/imgui/imgui_widgets.cpp \
              include/imgui/imgui_tables.cpp

          else
            g++ -shared -fPIC -o build/native/libimgui.so \
              -I"$JNI_INCLUDE" \
              -I"$JNI_PLATFORM" \
              -Iinclude -Iinclude/imgui \
              generated/wrapper.cpp \
              include/imgui/imgui.cpp \
              include/imgui/imgui_draw.cpp \
              include/imgui/imgui_widgets.cpp \
              include/imgui/imgui_tables.cpp
          fi
        shell: bash

      - name: Package native JAR
        run: |
          mkdir -p jar/imgui

          if [ "$RUNNER_OS" = "Windows" ]; then
            cp build/native/imgui.dll jar/imgui/
            jar cf dist/imgui-natives-windows.jar -C jar .
          else
            cp build/native/libimgui.so jar/imgui/
            jar cf dist/imgui-natives-linux.jar -C jar .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: natives-${{ matrix.os }}
          path: dist/

  release:
    needs: [generate-bindings, build-natives]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.generate-bindings.outputs.version }}
          name: Release v${{ needs.generate-bindings.outputs.version }}
          files: dist/**/*
