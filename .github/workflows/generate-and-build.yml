name: Generate and Build (SWIG)

on:
  workflow_dispatch:

jobs:
  generate-bindings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SWIG
        run: |
          sudo apt-get update
          sudo apt-get install -y swig

      - name: Set up Java (for JNI headers)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate Java Bindings
        run: |
          ls include
          mkdir -p generated/java

          swig -c++ -java \
               -package imgui \
               -outdir generated/java \
               -o generated/wrapper.cpp \
               -Iinclude \
               bindings.i

      - name: Upload generated files (debug)
        uses: actions/upload-artifact@v4
        with:
          name: generated-bindings
          path: generated/

  build:
    runs-on: ${{ matrix.os }}
    needs: generate-bindings

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download generated bindings
        uses: actions/download-artifact@v4
        with:
          name: generated-bindings
          path: generated/

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install SWIG (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y swig

      - name: Install SWIG (macOS)
        if: runner.os == 'macOS'
        run: brew install swig

      - name: Install SWIG (Windows)
        if: runner.os == 'Windows'
        run: choco install swig

      - name: Set JNI include paths
        id: jni
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "JNI_INCLUDE=$JAVA_HOME/include" >> $GITHUB_ENV

          if [ "$RUNNER_OS" = "Linux" ]; then
            echo "JNI_PLATFORM=$JAVA_HOME/include/linux" >> $GITHUB_ENV
          elif [ "$RUNNER_OS" = "macOS" ]; then
            echo "JNI_PLATFORM=$JAVA_HOME/include/darwin" >> $GITHUB_ENV
          else
            echo "JNI_PLATFORM=$JAVA_HOME/include/win32" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Compile native library
        run: |
          mkdir -p build

          if [ "$RUNNER_OS" = "Windows" ]; then
            g++ -shared -o build/native.dll \
              -I"$JNI_INCLUDE" \
              -I"$JNI_PLATFORM" \
              generated/wrapper.cpp include/build.cpp
          elif [ "$RUNNER_OS" = "macOS" ]; then
            g++ -dynamiclib -fPIC -o build/libnative.dylib \
              -I"$JNI_INCLUDE" \
              -I"$JNI_PLATFORM" \
              generated/wrapper.cpp include/build.cpp
          else
            g++ -shared -fPIC -o build/libnative.so \
              -I"$JNI_INCLUDE" \
              -I"$JNI_PLATFORM" \
              generated/wrapper.cpp include/build.cpp
          fi
        shell: bash

      - name: Compile Java classes
        run: |
          javac generated/java/*.java

      - name: Upload build outputs (debug)
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            build/
            generated/java/*.class
